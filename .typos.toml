[default]
extend-ignore-re = [
  # === Block ignore: typos:off → typos:on ===
  # Supports:
  #   <!-- typos:off -->   ...   <!-- typos:on -->
  #   # typos:off          ...   # typos:on
  #   // typos:off         ...   // typos:on
  #   /* typos:off */      ...   /* typos:on */
  "(?s)(<!--|#|//|/\\*)\\s*typos:off.*?\\n\\s*(<!--|#|//|\\*/)\\s*typos:on",

  # === Single-line ignore ===
  # Example: some text with intentional typo  <!-- typos:disable-line -->
  # or: some text with intentional typo  # typos:disable-line
  "(?Rm)^.*(<!--|#|//)\\s*typos:disable-line\\s*.*?(-->)?$",

  # === Ignore next line ===
  # <!-- typos:ignore-next-line -->
  # next line with potential false positive
  "(<!--|#|//)\\s*typos:ignore-next-line\\s*.*?(-->)?\\n.*",
]

[default.extend-words]
# gravitational-wave term (spin precession), not a misspelling of "processing"
precessing = "precessing"
precession = "precession"
# cluster name referenced in a leakage-guard test, not a misspelling of "stadiums"
stadius = "stadius"
